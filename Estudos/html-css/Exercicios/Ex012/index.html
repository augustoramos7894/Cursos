<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedado localmente</h1>
    <p>Este video esta hospedado no meu servidor</p>
    
    <video width="560" poster="imagens/rosa.png" controls>
        <source src="midia/meuvideo.mp4" type="video/mp4">
        <p>Seu navegador nao tem compatibilidade com reprodução de videos</p>
    </video>
    
    <!-- video.m4v video/mp4
         video.webm video/webm
         video.ogv video/ogg-->

    <iframe width="560" height="315" src="https://www.youtube.com/embed/z14mB1j6sPM?si=84umEWMrg18zBavg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
