<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Verificador de Nacionalidade</h1>
    
    País de origem
    <input type="text" id="txtpais">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>
    <script>
        function verificar() {
            var pais = document.querySelector('#txtpais')
            var res = document.querySelector('#res')

            var nacionalidade = pais.value

            res.innerHTML = `Seu pais é ${nacionalidade} `

            if (nacionalidade == Brasil) {
                res.innerHTML += 'Brasileiro'

            } else {
                res.innerHTML += 'Estrangeiro'
            }
            
            
            }
    </script>

    
</body>
</html>
